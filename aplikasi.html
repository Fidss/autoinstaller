<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Auto Installer Panel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-dark text-light">

<div class="container mt-5">

<h2 class="text-info mb-4">Auto Installer Manager</h2>

<div class="card bg-secondary mb-4">
<div class="card-body">

<h5>Tambah Aplikasi</h5>

<input id="name" class="form-control mb-2" placeholder="Nama Aplikasi">

<input id="package" class="form-control mb-2" placeholder="Package Name">

<input id="url" class="form-control mb-2" placeholder="URL APK">

<button onclick="addApp()" class="btn btn-info">
Tambah Aplikasi
</button>

</div>
</div>

<div class="card bg-secondary">
<div class="card-body">

<h5>Daftar Aplikasi</h5>

<table class="table table-dark table-striped">

<thead>
<tr>
<th>Nama</th>
<th>Package</th>
<th>Action</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

</div>
</div>

</div>

<script>

const owner="Fidss"
const repo="AutoInstaller"
const file="apps.json"
const token="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"

let data

async function loadApps(){

let res=await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${file}`)

let json=await res.json()

let content=atob(json.content)

data=JSON.parse(content)

window.sha=json.sha

render()

}

function render(){

let table=document.getElementById("table")

table.innerHTML=""

data.apps.forEach((app,i)=>{

table.innerHTML+=`

<tr>

<td>${app.name}</td>

<td>${app.package}</td>

<td>

<button class="btn btn-danger btn-sm" onclick="deleteApp(${i})">

Delete

</button>

</td>

</tr>

`

})

}

function addApp(){

let name=document.getElementById("name").value
let packageName=document.getElementById("package").value
let url=document.getElementById("url").value

data.apps.push({

name:name,
package:packageName,
url:url

})

updateGitHub()

}

function deleteApp(i){

data.apps.splice(i,1)

updateGitHub()

}

async function updateGitHub(){

let content=btoa(JSON.stringify(data,null,2))

await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${file}`,{

method:"PUT",

headers:{
Authorization:`token ${token}`,
"Content-Type":"application/json"
},

body:JSON.stringify({

message:"update apps.json",

content:content,

sha:window.sha

})

})

alert("apps.json berhasil diupdate")

loadApps()

}

loadApps()

</script>

</body>
</html>
